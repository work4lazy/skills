name: Sync External Skills

on:
  schedule:
    - cron: '0 18 * * *'    # UTC 18:00 = 北京时间 02:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync external skills
        run: |
          git clone --depth 1 https://github.com/anthropics/skills.git /tmp/source
          rm -rf skills/external/anthropics-skills
          mkdir -p skills/external/anthropics-skills
          cp -r /tmp/source/skills/skill-creator skills/external/anthropics-skills/

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/external/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: sync external skills [skip ci]"
          git push
